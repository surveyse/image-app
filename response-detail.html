<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>جزئیات فرد</title>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Vazirmatn', sans-serif;
      background: #05070b;
      color: #fff;
    }
    .page {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }
    .toolbar a {
      color: rgba(255, 255, 255, 0.82);
      text-decoration: none;
    }
    .card {
      padding: 18px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      margin-bottom: 18px;
    }
    .photo-wrap {
      overflow: hidden;
      border-radius: 16px;
      background: #111;
      aspect-ratio: 3 / 4;
      max-width: 420px;
      margin: 0 auto;
    }
    .photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    h1, h2, p {
      margin-top: 0;
    }
    .kv {
      display: grid;
      gap: 12px;
    }
    .row {
      padding: 12px 14px;
      border-radius: 14px;
      background: #0f1218;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.92rem;
      color: rgba(255, 255, 255, 0.64);
    }
    .value {
      word-break: break-word;
      line-height: 1.8;
    }
    .empty {
      text-align: center;
      color: rgba(255, 255, 255, 0.72);
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="toolbar">
      <a href="panel.html">بازگشت به پنل</a>
      <span id="recordMeta"></span>
    </div>

    <div id="content" hidden>
      <section class="card">
        <h1>عکس فرد</h1>
        <div class="photo-wrap">
          <img id="photo" alt="Uploaded photo" />
        </div>
      </section>

      <section class="card">
        <h2>GPS و دستگاه</h2>
        <div class="kv">
          <div class="row">
            <span class="label">GPS</span>
            <div id="gpsValue" class="value"></div>
          </div>
          <div class="row">
            <span class="label">Google Maps</span>
            <div id="mapValue" class="value"></div>
          </div>
          <div class="row">
            <span class="label">User-Agent</span>
            <div id="uaValue" class="value"></div>
          </div>
        </div>
      </section>
    </div>

    <section id="notFound" class="card empty" hidden>
      <p>رکوردی برای این فرد پیدا نشد.</p>
      <a href="panel.html">بازگشت به پنل</a>
    </section>
  </main>

  <script src="response-detail.js"></script>
</body>
</html>
