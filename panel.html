<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>پنل IMAGE</title>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Vazirmatn', sans-serif;
      background: #05070b;
      color: #fff;
    }
    .page {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }
    .hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
      padding: 18px 20px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.04);
      box-shadow: 0 0 30px rgba(255, 0, 255, 0.1);
    }
    .hero h1 {
      margin: 0 0 6px;
      font-size: 1.4rem;
    }
    .hero p, .hero a, .meta {
      margin: 0;
      color: rgba(255, 255, 255, 0.72);
    }
    .hero a {
      text-decoration: none;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 16px;
    }
    .card {
      display: block;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      border-radius: 18px;
      background: #0f1218;
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition: transform 0.18s ease, border-color 0.18s ease;
    }
    .card:hover {
      transform: translateY(-2px);
      border-color: rgba(255, 255, 255, 0.16);
    }
    .thumb-wrap {
      aspect-ratio: 3 / 4;
      background: #111;
    }
    .thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .content {
      padding: 14px;
    }
    .title {
      margin: 0 0 10px;
      font-size: 1rem;
      font-weight: 600;
    }
    .meta {
      display: block;
      font-size: 0.92rem;
      line-height: 1.7;
    }
    .empty {
      padding: 30px 18px;
      border-radius: 18px;
      text-align: center;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.72);
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div>
        <h1>پنل افراد IMAGE</h1>
        <p>تفکیک فقط بر اساس عکس آپلودشده، GPS و نوع دستگاه</p>
      </div>
      <a href="index.html">بازگشت به صفحه اصلی</a>
    </section>

    <section id="recordsGrid" class="grid" aria-live="polite"></section>
    <div id="emptyState" class="empty" hidden>هنوز هیچ عکسی در این مرورگر ثبت نشده است.</div>
  </main>

  <script src="panel.js"></script>
</body>
</html>
